name: GUI CI (tests + docker image + deploy)

on:
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deployment target environment"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - dev
          - prod
      run_sonar:
        description: "Run SonarCloud analysis"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Run GUI tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.17
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests & build frontend
        run: |
          npm run lint --if-present
          npm run test:coverage --if-present
          npm run build

      - name: SonarCloud analysis
        if: github.event_name == 'pull_request' || github.event.inputs.run_sonar == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  build_and_push:
    name: Build & push Docker image
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}
      tag: ${{ steps.vars.outputs.tag }}
      namespace: ${{ steps.vars.outputs.namespace }}
      deploy_environment: ${{ steps.vars.outputs.deploy_environment }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image vars
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DEPLOY_TARGET: ${{ github.event.inputs.deploy_target }}
          SOURCE_BRANCH: ${{ github.head_ref || github.ref_name }}
          TARGET_BRANCH: ${{ github.base_ref }}
        run: |
          OWNER=${GITHUB_REPOSITORY_OWNER,,}
          SHA=${GITHUB_SHA::7}
          DEPLOY_TARGET=${INPUT_DEPLOY_TARGET:-auto}

          if [ "$DEPLOY_TARGET" = "prod" ]; then
            DEPLOY_ENVIRONMENT=prod
          elif [ "$DEPLOY_TARGET" = "dev" ]; then
            DEPLOY_ENVIRONMENT=dev
          elif [ "$EVENT_NAME" = "pull_request" ] && [ "$TARGET_BRANCH" = "main" ]; then
            DEPLOY_ENVIRONMENT=prod
          elif [ "$SOURCE_BRANCH" = "main" ]; then
            DEPLOY_ENVIRONMENT=prod
          else
            DEPLOY_ENVIRONMENT=dev
          fi

          if [ "$DEPLOY_ENVIRONMENT" = "prod" ]; then
            IMAGE_NAME=${OWNER}/flashcards-gui
          else
            IMAGE_NAME=${OWNER}/flashcards-gui-dev
          fi
          NAMESPACE=moomento

          TAG=sha-${SHA}

          echo image_name=${IMAGE_NAME} >> $GITHUB_OUTPUT
          echo tag=${TAG} >> $GITHUB_OUTPUT
          echo namespace=${NAMESPACE} >> $GITHUB_OUTPUT
          echo deploy_environment=${DEPLOY_ENVIRONMENT} >> $GITHUB_OUTPUT

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag }}

  deploy:
    name: Deploy to Kubernetes
    needs: build_and_push
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    environment: ${{ needs.build_and_push.outputs.deploy_environment }}

    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            export KUBECONFIG=/home/ubuntu/.kube/config

            IMAGE="ghcr.io/${{ needs.build_and_push.outputs.image_name }}:${{ needs.build_and_push.outputs.tag }}"
            NAMESPACE="${{ needs.build_and_push.outputs.namespace }}"

            echo Deploying FRONTEND to namespace: $NAMESPACE
            echo Using image: $IMAGE

            kubectl -n $NAMESPACE set image deployment/frontend frontend=$IMAGE
            kubectl -n $NAMESPACE rollout status deployment/frontend
